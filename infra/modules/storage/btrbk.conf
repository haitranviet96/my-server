snapshot_preserve_min latest
snapshot_preserve 7d
stream_compress zstd

# Var filesystem: local snapshots + external backup
volume /var
  snapshot_dir .snapshots
  snapshot_create always
  target_preserve 7d 3w 1m

  target /media/BackupSystem/var

  # "." targets the root of the volume directory defined above (/var)
  subvolume .
    snapshot_name var

# Home filesystem: local snapshots + external backup
volume /home
  snapshot_dir .snapshots
  snapshot_create always
  target_preserve 7d 3w 1m

  target /media/BackupSystem/home

  subvolume .
    snapshot_name home

# Data volume: split into separate backup targets
volume /media/Data
  snapshot_dir .snapshots
  snapshot_create always
  target_preserve 7d 3w 3m

  subvolume @archived
    snapshot_name archived
    target /media/BackupData/@archived

  subvolume @mydata
    snapshot_name mydata
    target /media/BackupData/@mydata
