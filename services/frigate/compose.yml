
services:
  frigate:
    container_name: frigate
    restart: unless-stopped
    stop_grace_period: 30s # allow enough time to shut down the various services
    image: ghcr.io/garymathews/frigate:latest-rocm-7.2.3

    devices:
      - /dev/dri:/dev/dri # Required for hardware rendering & transcoding (VA-API)
      - /dev/kfd:/dev/kfd # Required for ROCm compute (e.g., machine learning, Ollama)

    environment:
      - HSA_OVERRIDE_GFX_VERSION=9.0.0
      - HSA_XNACK=0 # specify for gfx90c

    shm_size: "256mb"

    volumes:
      - /home/haitv/.config/frigate:/config
      - /media/Data/@media/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro
      - type: tmpfs # 1GB In-memory filesystem for recording segment storage
        target: /tmp/cache
        tmpfs:
          size: 1073741824

    ports:
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
      - "8971:8971/tcp"
      - "8971:8971/udp"
      - "1984:1984"
