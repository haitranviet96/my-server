name: multimedia

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    env_file:
      - ../docker.env
    group_add:
      - "303" # render
    environment:
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-amd
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    volumes:
      - /home/haitv/.config/jellyfin:/config
      - /media/Data/@media/media:/media
      - /home/haitv/.cache/jellyfin:/cache
    restart: 'unless-stopped'
    networks:
      - multimedia

networks:
  multimedia:
    name: multimedia
    external: true
